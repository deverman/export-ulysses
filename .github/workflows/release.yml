name: Signed Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: signed-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dependencies
        run: swift package resolve
      - name: Test
        run: swift test
      - name: Build App Store target
        run: >-
          xcodebuild -project ExportUlysses.xcodeproj -scheme "Export Ulysses"
          -configuration Release -destination "generic/platform=macOS"
          CODE_SIGNING_ALLOWED=NO build

  release:
    needs: validate
    timeout-minutes: 60
    strategy:
      max-parallel: 1
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-26-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ inputs.version }}
      ARCH: ${{ matrix.arch }}
      CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Require signing and notarization secrets
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$CODESIGN_IDENTITY"
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_PASSWORD"
      - name: Install signing certificate
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" release.keychain-db
          security set-keychain-settings -lut 21600 release.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" release.keychain-db
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k release.keychain-db
          security list-keychain -d user -s release.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" release.keychain-db
      - name: Build, sign, notarize, and checksum
        run: swift run -c release release-tool package "$VERSION" "$ARCH"
      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v$VERSION" >/dev/null 2>&1 || gh release create "v$VERSION" --title "export-ulysses $VERSION" --generate-notes
          gh release upload "v$VERSION" dist/* --clobber
