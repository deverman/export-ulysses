name: Feature request
description: Request support for another Ulysses or FSNotes migration behavior.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Migration problem
      description: What Ulysses data or FSNotes behavior are you trying to preserve?
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current export behavior
      description: What does export-ulysses do today?
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired export behavior
      description: Describe the output you would expect in FSNotes or TextBundle.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link Ulysses/FSNotes/TextBundle docs, screenshots, or a small non-private fixture if available.

